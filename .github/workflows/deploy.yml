name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]

# Permet d'écrire sur les GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permet d'éviter le chevauchement des déploiements
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # On déploie le dossier courant complet puisque c'est un site statique sans build
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
